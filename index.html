<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title></title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="src/main.css">
    <script src="https://cdn.plot.ly/plotly-3.6.0.min.js" charset="utf-8"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/numeric/1.2.6/numeric.min.js"></script>
</head>

<body>
    <div class="horizontal_align_container">
        <div class="graph_container">
            <div id="hydrogen-cation-energy-chart" , class="hydrogen-cation-chart" style="aspect-ratio: 1 / 1;"></div>
            <div class="radius_slider_container">
                <!-- <label for="radius">Radius:</label> -->
                <input id="radius" type="range" min="1" max="6" step="0.01"
                    oninput="update_radius(parseFloat(this.value))">
            </div>
        </div>
        <div class="vertical_align_container">
            <div class="input_row">
                <label for="radius_text">Radius:</label>
                <input id="radius_text" class="hide-arrows" style="width: 40px;" type="number" min="0.1" max="6"
                    step="any" oninput="update_radius(parseFloat(this.value))">
                <span>a<sub>0</sub></span>
            </div>
            <div class="input_row">
                <span>E<sup>g</sup> - E<sub>1s</sub>:</span>
                <output id="bonding_text"></output>
                <span>eV</span>
            </div>
            <div class="input_row">
                <span>E<sup>u</sup> - E<sub>1s</sub>:</span>
                <output id="antibonding_text"></output>
                <span>eV</span>
            </div>
            <div class="input_row">
                <span>E<sup>u</sup> - E<sup>g</sup>:</span>
                <output id="energy_diff"></output>
                <span>eV</span>
            </div>
        </div>
        <div class="graph_container">
            <div id="hydrogen-cation-bond-probability-chart" class="hydrogen-cation-chart"
                style="aspect-ratio: 4/3; max-height: 50vh;"></div>
            <div id="hydrogen-cation-antibond-probability-chart" class="hydrogen-cation-chart"
                style="aspect-ratio: 4/3; max-height: 50vh;"></div>
        </div>
    </div>
    <script src="src/main.js" defer></script>
</body>

</html>
